<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
    <meta name="theme-color" content="#070608" />

    <!-- ── Primary SEO ── -->
    <title>Awaz آواز — Book Afghan Artists in Europe</title>
    <meta name="description" content="Book verified Afghan artists for weddings, Eid celebrations, concerts and private events across Europe. Transparent pricing, instant Stripe payments. Artists in Norway, Sweden, Germany, UK and more." />
    <meta name="keywords" content="Afghan artists, book Afghan musician, Afghan wedding singer, Ghazal, Rubab, Afghan music Europe, Afghan events Norway, Afghan events Sweden, Afghan events Germany" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Awaz AS" />
    <link rel="canonical" href="https://awaz.no" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://awaz.no" />
    <meta property="og:site_name" content="Awaz" />
    <meta property="og:title" content="Awaz — Book Afghan Artists in Europe" />
    <meta property="og:description" content="Book verified Afghan artists for weddings and events across Europe. Transparent pricing, instant Stripe payments. Artists keep 88%." />
    <meta property="og:image" content="https://awaz.no/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_GB" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Awaz — Book Afghan Artists in Europe" />
    <meta name="twitter:description" content="Book verified Afghan artists for weddings and events across Europe." />
    <meta name="twitter:image" content="https://awaz.no/og-image.jpg" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300;1,400;1,600&family=Noto+Naskh+Arabic:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- ── Performance ── -->
    <link rel="dns-prefetch" href="https://api.stripe.com" />
    <link rel="dns-prefetch" href="https://js.stripe.com" />
    <link rel="preconnect" href="https://js.stripe.com" />

    <!-- ── Mobile PWA ── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Awaz" />

    <!-- ── Structured Data (Google) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Awaz",
      "alternateName": "آواز",
      "url": "https://awaz.no",
      "logo": "https://awaz.no/logo.png",
      "description": "The premier booking platform for Afghan artists performing across Europe.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "NO"
      },
      "areaServed": ["NO","SE","DK","DE","AT","CH","GB","NL","BE","FR","IT","ES","FI","PL"],
      "sameAs": []
    }
    </script>

    <style>
      /* Critical CSS — prevents flash of unstyled content */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%;
        height: 100%;
        background: #070608;
        color: #EDE4CE;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        /* Prevent iOS bounce scroll */
        overscroll-behavior: none;
      }
      #root {
        min-height: 100%;
        min-height: 100dvh;
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
      }
      /* Loading spinner shown before React hydrates */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #070608;
        z-index: 9999;
        gap: 20px;
        transition: opacity 0.4s ease;
      }
      #app-loading.hidden { opacity: 0; pointer-events: none; }
      .loading-logo {
        font-family: 'Noto Naskh Arabic', serif;
        font-size: 28px;
        color: #C8A84A;
        letter-spacing: 2px;
      }
      .loading-sub {
        font-size: 13px;
        color: #4A4054;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .loading-spinner {
        width: 28px;
        height: 28px;
        border: 2px solid #201D2E;
        border-top-color: #C8A84A;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Safe area insets for iPhone notch / Dynamic Island */
      body {
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: 0;
      }
      /* Smooth scrolling */
      html { scroll-behavior: smooth; }
      /* Better tap targets on mobile */
      button, a, [role="button"] {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      /* Prevent text resize on orientation change */
      body { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    </style>
  </head>

  <body>
    <!-- Loading screen — hidden once React mounts -->
    <div id="app-loading">
      <div class="loading-logo">آواز</div>
      <div class="loading-spinner"></div>
      <div class="loading-sub">Awaz</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Hide loading screen once React has rendered
      window.addEventListener('load', function() {
        setTimeout(function() {
          var el = document.getElementById('app-loading');
          if (el) {
            el.classList.add('hidden');
            setTimeout(function() { el.remove(); }, 500);
          }
        }, 400);
      });
    </script>
  </body>
</html>
